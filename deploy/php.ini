; cPanel php.ini overrides for FlyoverCMS production
; Place in: ~/public_html/php.ini OR configure via cPanel PHP Selector

; OPcache — biggest free performance win
opcache.enable=1
opcache.enable_cli=1
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
opcache.revalidate_freq=0
opcache.validate_timestamps=0  ; Set to 1 during deploys, 0 after
opcache.save_comments=1
opcache.fast_shutdown=1

; PHP limits
memory_limit=256M
max_execution_time=60
upload_max_filesize=32M
post_max_size=33M
max_input_vars=3000

; Session (use Redis for production — set in framework.yaml)
session.gc_maxlifetime=7200
session.cookie_httponly=1
session.cookie_secure=1
session.use_strict_mode=1

; Security
expose_php=Off
display_errors=Off
log_errors=On
error_log=/home/username/logs/php_errors.log
